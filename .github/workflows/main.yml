name: TQQQ Alert System

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'check'
        type: choice
        options:
          - check
          - daily
          - auto
      schedule:
        description: 'Cron expression from external scheduler'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install yfinance pandas requests
      - name: Run alert
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_EVENT_SCHEDULE: ${{ inputs.schedule }}
          RUN_MODE: ${{ inputs.mode }}
        run: python script.py "${RUN_MODE:-auto}"
      - name: Save position state
        run: |
          if git diff --quiet -- position_state.json; then
            echo "No position state changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add position_state.json
          git commit -m "Update position state"
          git push
