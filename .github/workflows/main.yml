name: TQQQ Alert System

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'check'
        type: choice
        options:
          - check
          - daily
          - auto
      schedule:
        description: 'Cron expression from external scheduler'
        required: false
        default: ''

jobs:
  alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install yfinance pandas requests
      - name: Run alert
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_EVENT_SCHEDULE: ${{ inputs.schedule }}
          RUN_MODE: ${{ inputs.mode }}
        run: python script.py "${RUN_MODE:-auto}"
