name: TQQQ Alert System

on:
  schedule:
    - cron: '30 13 * * 1-5'   # 16:30 Israel — 30 min after US market open
    - cron: '45 20 * * 1-5'   # 23:45 Israel — after US market close
  workflow_dispatch:

jobs:
  intraday-check:
    if: ${{ github.event.schedule == '30 13 * * 1-5' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install yfinance pandas requests
      - name: Run signal check
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python script.py check

  daily-report:
    if: ${{ github.event.schedule == '45 20 * * 1-5' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install yfinance pandas requests
      - name: Run daily report
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python script.py daily
